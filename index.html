<!DOCTYPE html>
<html>
  <head>
    <title>Time Incremental II</title>
  	<link rel="stylesheet" type="text/css" href="./style.css">
  	<link href="https://fonts.googleapis.com/css?family=Inconsolata" rel="stylesheet">
  </head>
  <body>
    <div id="points">You have <span id="points-stat" class="stats">0s</span>.</div>
    <div id="speed">The time is going at x<span id="speed-stat" class="stats">1</span> speed.</div>
    <div id="time-resets" style="display: none">
      You have <span id="time-resets-stat" class="stats">0</span> time resets.
          <button id="time-resets" class="reset-button" disabled>Cannot reset</button>
    </div>
    <div id="upgrades" class="upg-list">
      <div id="hastener" class="upg-container">
        <div id="upg-name">Hastener</div>
        <div id="hastener" class="current-gain">?</div>
        <div id="hastener" class="upg-buttons">
          <button id="hastener" class="upg-button">Buy for 1s</button>
          <button id="hastener" class="upg-max-button">MAX</button>
        </div>
      </div>
      <div id="generator" class="upg-container">
        <div id="upg-name">Generator</div>
        <div id="generator" class="current-gain">?</div>
        <div id="generator" class="upg-buttons">
          <button id="generator" class="upg-button">Buy for 1s</button>
          <button id="generator" class="upg-max-button">MAX</button>
        </div>
      </div>
      <div id="powerer" class="upg-container">
        <div id="upg-name">Powerer</div>
        <div id="powerer" class="current-gain">?</div>
        <div id="powerer" class="upg-buttons">
          <button id="powerer" class="upg-button">Buy for 1s</button>
          <button id="powerer" class="upg-max-button">MAX</button>
        </div>
      </div>
      <div id="counter" class="upg-container">
        <div id="upg-name">Counter</div>
        <div id="counter" class="current-gain">?</div>
        <div id="counter" class="upg-buttons">
          <button id="counter" class="upg-button">Buy for 1s</button>
          <button id="counter" class="upg-max-button">MAX</button>
        </div>
      </div>
    </div>
  	<script src="./utils/break_eternity.js"></script>
  	<script src="./utils/NumberFormating.js"></script>
  	<script src="./components/upgrade.js"></script>
  	<script src="./configs/data.js"></script>
  	<script src="./configs/functions.js"></script>
  	<script src="./ui.js"></script>
  	<script src="./main.js"></script>
  </body>
</html>
